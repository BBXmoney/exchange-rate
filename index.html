<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>อัตราแลกเงินวันนี้ - BBXmoney</title>
  <meta name="description" content="อัตราแลกเปลี่ยนเงินตราต่างประเทศ อัปเดตล่าสุด USD GBP EUR JPY และอื่นๆ อีกมากมาย">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; }
    header { background: #1a56db; color: white; padding: 20px; text-align: center; }
    header h1 { font-size: 1.8rem; }
    header p { opacity: 0.85; margin-top: 4px; }
    .badge { display: inline-block; background: #fbbf24; color: #333;
             padding: 3px 12px; border-radius: 20px; font-size: 0.85rem;
             margin-top: 8px; font-weight: bold; }
    .updated { text-align: center; padding: 10px; color: #666; font-size: 0.9rem; }
    table { width: 95%; max-width: 700px; margin: 10px auto 20px;
            border-collapse: collapse; background: white;
            border-radius: 10px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    th { background: #1a56db; color: white; padding: 12px; text-align: center; }
    td { padding: 11px 12px; text-align: center; border-bottom: 1px solid #eee; font-size: 0.95rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f0f4f8; }
    .buy { color: #16a34a; font-weight: bold; }
    .sell { color: #dc2626; font-weight: bold; }
    #loginBox { width: 90%; max-width: 380px; margin: 20px auto;
                background: white; border-radius: 12px; padding: 28px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
    #loginBox h2 { margin-bottom: 6px; color: #1a56db; }
    #loginBox p { color: #666; font-size: 0.9rem; margin-bottom: 14px; }
    #loginBox input { width: 100%; padding: 10px 14px; margin: 6px 0;
                      border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
    #loginBox button { width: 100%; padding: 11px; margin-top: 10px;
                       background: #1a56db; color: white; border: none;
                       border-radius: 8px; font-size: 1rem; cursor: pointer; }
    #loginBox button:hover { background: #1e40af; }
    #errorMsg { color: #ef4444; font-size: 0.88rem; margin-top: 8px; min-height: 20px; }
    #logoutBtn { display: block; margin: 0 auto 16px; padding: 8px 24px;
                 background: #ef4444; color: white; border: none;
                 border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
    footer { text-align: center; padding: 20px; color: #999; font-size: 0.82rem; }
  </style>
</head>
<body>

<header>
  <h1>💱 อัตราแลกเงินวันนี้</h1>
  <p>BBXmoney — อัปเดต Real Time</p>
  <span id="vipBadge" class="badge" style="display:none">⭐ สมาชิก VIP</span>
</header>

<p class="updated" id="updated">กำลังโหลดข้อมูล...</p>

<table>
  <thead>
    <tr>
      <th>สกุลเงิน</th>
      <th>ชื่อ</th>
      <th>รับซื้อ</th>
      <th>ขาย</th>
    </tr>
  </thead>
  <tbody id="rateTable">
    <tr><td colspan="4">กำลังโหลด...</td></tr>
  </tbody>
</table>

<div id="loginBox">
  <h2>🔐 สมาชิก VIP</h2>
  <p>Login เพื่อดูอัตราพิเศษสำหรับสมาชิก</p>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">เข้าสู่ระบบ</button>
  <p id="errorMsg"></p>
</div>

<button id="logoutBtn" style="display:none" onclick="logout()">ออกจากระบบ</button>

<footer>
  © BBXmoney | อัตราแลกเปลี่ยนเงินตราต่างประเทศ อัปเดตอัตโนมัติ
</footer>

<script>
  const SUPABASE_URL = 'https://rgyihmjdowaeoofqwpcp.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_yKxRRNmq80FQirLEv2oJhw_w6lly-gX';
  const PUBLIC_CSV  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQs6JEWMlGmxBenrtg7NaHuNiegAFmOhDft1Yy5tQp15NmgsAyVtW9D9X8SU31bw4rqtn4WYmokjha8/pub?gid=0&single=true&output=csv';
  const VIP_CSV     = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQs6JEWMlGmxBenrtg7NaHuNiegAFmOhDft1Yy5tQp15NmgsAyVtW9D9X8SU31bw4rqtn4WYmokjha8/pub?gid=0&single=true&output=csv'; // ใช้อันเดียวกันก่อน จนกว่าจะสร้าง VIP Sheet

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  async function loadRates(isVip) {
    const url = isVip ? VIP_CSV : PUBLIC_CSV;
    try {
      const res = await fetch(url);
      const text = await res.text();
      const rows = text.trim().split('\n').slice(1);
      const tbody = document.getElementById('rateTable');
      tbody.innerHTML = '';
      rows.forEach(row => {
        const cols = row.split(',');
        if (cols.length < 2) return;
        const currency = cols[0]?.trim();
        const name     = cols[2]?.trim(); // Last Update อยู่ col 2, ปรับถ้าต้องการ
        const buy      = parseFloat(cols[13]); // คอลัมน์ BUY (M)
        const sell     = parseFloat(cols[14]); // คอลัมน์ SELL (N)
        if (!currency || isNaN(buy)) return;
        tbody.innerHTML += `
          <tr>
            <td><strong>${currency}</strong></td>
            <td>${name || '-'}</td>
            <td class="buy">${buy.toFixed(5)}</td>
            <td class="sell">${sell.toFixed(5)}</td>
          </tr>`;
      });
      const now = new Date().toLocaleString('th-TH');
      document.getElementById('updated').textContent =
        `${isVip ? '⭐ เรทพิเศษ VIP' : 'เรทปกติ'} | อัปเดตล่าสุด: ${now}`;
    } catch(e) {
      document.getElementById('rateTable').innerHTML =
        '<tr><td colspan="4">ไม่สามารถโหลดข้อมูลได้</td></tr>';
    }
  }

  async function login() {
    const email = document.getElementById('email').value;
    const pass  = document.getElementById('password').value;
    document.getElementById('errorMsg').textContent = '';
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) document.getElementById('errorMsg').textContent = 'Email หรือ Password ไม่ถูกต้อง';
  }

  async function logout() {
    await sb.auth.signOut();
    location.reload();
  }

  sb.auth.onAuthStateChange((event, session) => {
    const isVip = !!session;
    document.getElementById('loginBox').style.display  = isVip ? 'none'         : 'block';
    document.getElementById('logoutBtn').style.display = isVip ? 'block'        : 'none';
    document.getElementById('vipBadge').style.display  = isVip ? 'inline-block' : 'none';
    loadRates(isVip);
  });

  setInterval(async () => {
    const { data: { session } } = await sb.auth.getSession();
    loadRates(!!session);
  }, 60000);
</script>

</body>
</html>
